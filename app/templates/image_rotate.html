{% extends "base.html" %}

{% block title %}
Rotacionar Imagem
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="card page-card">

        <div class="card-body p-4">

            <a href="/"
            class="btn btn-outline-secondary mb-4">
                Voltar
            </a>

            <div class="converter-banner">

                <img
                    src="{{ url_for('static',
                    filename='images/tools/multicolor.svg') }}"
                    alt="Imagem">

                <span class="converter-arrow">
                    →
                </span>

                <img
                    src="{{ url_for('static',
                    filename='images/tools/rotate.svg') }}"
                    alt="Rotacionar">

            </div>

            <h2 class="text-center">
                Rotacionar Imagem
            </h2>

            <p class="text-muted text-center">
                Rotacione imagens utilizando OpenCV.
            </p>

            <form
                method="POST"
                enctype="multipart/form-data">

                <div class="mb-3">

                    <label class="form-label">
                        Imagem
                    </label>

                    <input
                        type="file"
                        name="arquivo"
                        class="form-control"
                        accept=".jpg,.jpeg,.png"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Ângulo
                    </label>

                    <input
                        type="number"
                        name="angulo"
                        class="form-control"
                        value="10"
                        required>

                    <small class="text-muted">
                        Use valores positivos ou negativos.
                    </small>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary">

                    Rotacionar

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
