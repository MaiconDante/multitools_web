{% extends "base.html" %}

{% block title %}
    RTF para DOCX - Lote
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="card page-card">

        <div class="card-body p-4">

            <a href="/"
               class="btn btn-outline-secondary mb-4">
                Voltar
            </a>

            <div class="converter-banner">

                <img
                    src="{{ url_for('static',
                    filename='images/tools/rtf.svg') }}"
                    alt="RTF">

                <span class="converter-arrow">
                    📦
                </span>

                <img
                    src="{{ url_for('static',
                    filename='images/tools/zip.svg') }}"
                    alt="DOCX">

            </div>

            <h2 class="text-center">
                RTF → DOCX (Lotes)
            </h2>

            <p class="text-muted text-center">
                Selecione vários arquivos RTF para conversão em DOCX.
            </p>

            <form
                method="POST"
                enctype="multipart/form-data">

                <div class="mb-3">

                    <label class="form-label">
                        Selecione vários arquivos RTF
                    </label>

                    <input
                        type="file"
                        name="arquivos"
                        class="form-control"
                        multiple
                        accept=".rtf"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary">
                    Converter Arquivos
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
