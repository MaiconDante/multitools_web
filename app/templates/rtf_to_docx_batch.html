{% extends "base.html" %}

{% block title %}
    RTF para DOCX - Lote
{% endblock %}

{% block content %}

<div class="container py-5">

    <a href="/" class="btn btn-secondary mb-4">
        Voltar
    </a>

    <h1 class="mb-4">
        Conversão em Lote RTF → DOCX
    </h1>

    <form
        method="POST"
        enctype="multipart/form-data">

        <div class="mb-3">

            <label class="form-label">
                Selecione vários arquivos RTF
            </label>

            <input
                type="file"
                name="arquivos"
                class="form-control"
                multiple
                accept=".rtf"
                required>

        </div>

        <button
            type="submit"
            class="btn btn-primary">
            Converter Arquivos
        </button>

    </form>

</div>


{% endblock %}
