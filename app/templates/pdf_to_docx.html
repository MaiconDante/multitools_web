{% extends "base.html" %}

{% block title %}
PDF para DOCX
{% endblock %}

{% block content %}

<div class="card page-card">

    <div class="card-body p-4">

        <a href="/"
           class="btn btn-outline-secondary mb-4">
            Voltar
        </a>


        <div class="converter-banner">

            <img
                src="{{ url_for('static',
                filename='images/tools/pdf.svg') }}"
                alt="PDF">


            <span class="converter-arrow">
                →
            </span>


            <img
                src="{{ url_for('static',
                filename='images/tools/word.svg') }}"
                alt="DOCX">

        </div>


        <h2 class="text-center">
            PDF para DOCX
        </h2>


        <p class="text-muted text-center">
            Converta arquivos PDF com texto para documentos DOCX editáveis.
        </p>


        <form
            method="POST"
            enctype="multipart/form-data">


            <div class="mb-3">

                <label class="form-label">
                    Selecione um arquivo PDF
                </label>


                <input
                    type="file"
                    name="arquivo"
                    class="form-control"
                    accept=".pdf"
                    required>

            </div>


            <button
                type="submit"
                class="btn btn-primary">

                Converter

            </button>


        </form>


    </div>

</div>

{% endblock %}
