{% extends "base.html" %}

{% block title %}
Gerar QR Code
{% endblock %}


{% block content %}

<div class="container py-5">

    <div class="card page-card">

        <div class="card-body p-4">


            <a href="/"
            class="btn btn-outline-secondary mb-4">
                Voltar
            </a>


            <div class="converter-banner">

                <img
                    src="{{ url_for('static',
                    filename='images/tools/qr.svg') }}"
                    alt="QR Code">

            </div>


            <h2 class="text-center">
                Gerar QR Code
            </h2>


            <p class="text-muted text-center">
                Digite um texto ou link para gerar seu QR Code.
            </p>


            <form
                method="POST">


                <div class="mb-3">

                    <label class="form-label">
                        Texto ou URL
                    </label>


                    <input
                        type="text"
                        name="texto"
                        class="form-control"
                        placeholder="Digite aqui..."
                        required>

                </div>


                <button
                    type="submit"
                    class="btn btn-primary">

                    Gerar QR Code

                </button>


            </form>


        </div>

    </div>
    
</div>


{% endblock %}
