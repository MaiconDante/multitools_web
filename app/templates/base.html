<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <!-- Page Title -->
    <title>
        {% block title %}
            Multitools Web
        {% endblock %} | Multitools Web
    </title>

    <!-- Favicon -->
    <link
    rel="icon"
    href="{{ url_for('static', filename='images/favicon.ico') }}">

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap JS Bundle -->
    <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Custom CSS -->
    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">

        <div class="container">

            <a class="navbar-brand mx-auto" href="/">

                <img
                    src="{{ url_for('static', filename='images/multitools.png') }}"
                    alt="Multitools Web Logo"
                    class="navbar-logo">

            </a>

        </div>

    </nav>

    {% block content %}
    {% endblock %}

    <footer class="footer-custom mt-5">

        <div class="container text-center">

            <h6 class="mb-2">
                Multitools Web
            </h6>

            <small>
                Conversão e ferramentas de produtividade para documentos Word Online.
            </small>

            <br>

            <small>
                Versão 1.0
            </small>

        </div>

    </footer>

</body>

</html>
