<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multitools Web</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <div class="container py-5">

        <div class="text-center mb-5">
            <h1 class="fw-bold">Multitools Web</h1>
            <p class="text-muted">
                Conversão de documentos de forma simples e rápida
            </p>
        </div>

        <div class="row g-4">

            <div class="col-md-6 col-lg-3">
                <a href="/rtf-docx" class="text-decoration-none">
                    <div class="card tool-card">
                        <div class="card-body text-center">
                            <h5>RTF → DOCX</h5>
                        </div>
                    </div>
                </a>
            </div>

            <div class="col-md-6 col-lg-3">
                <div class="card tool-card">
                    <div class="card-body text-center">
                        <h5>RTF → DOC</h5>
                    </div>
                </div>
            </div>

            <div class="col-md-6 col-lg-3">
                <div class="card tool-card">
                    <div class="card-body text-center">
                        <h5>PDF → DOCX</h5>
                    </div>
                </div>
            </div>

            <div class="col-md-6 col-lg-3">
                <div class="card tool-card">
                    <div class="card-body text-center">
                        <h5>PDF OCR → DOCX</h5>
                    </div>
                </div>
            </div>

            <div class="col-md-6 col-lg-3">
                <a href="/rtf-docx-lote" class="text-decoration-none">
                    <div class="card tool-card">
                        <div class="card-body text-center">
                            <h5>RTF → DOCX (Lote)</h5>
                        </div>
                    </div>
                </a>
            </div>

        </div>

    </div>

</body>

</html>
